    <script>

       var rtsp_address = window.location.search
       var urlParams = new URLSearchParams(rtsp_address);
       var lang = urlParams.get('lang');
       var videoStreamImg = document.getElementById("videoStream");
       videoStreamImg.src = 'zanting.jpg';


       let streamPaused = false;

       videoStreamImg.addEventListener('click', function() {
           if (!streamPaused) {
            if (lang) {
              videoStreamImg.src = lang;
              streamPaused = true;
              setTimeout(function() {
                  videoStreamImg.src = 'zanting.jpg';
                  streamPaused = false;
              }, 600000); // 10分钟后暂停，10分钟 = 600000毫秒
            } else {
              videoStreamImg.src = 'zanting.jpg';
              streamPaused = false;
              alert('无法获取视频流路径')
            }
           } else {
             videoStreamImg.src = 'zanting.jpg';
             streamPaused = false;
           }
       });
