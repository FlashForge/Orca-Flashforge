<style>
  body {
    margin: 0;
  }
  #videoStream {
    width: 100vw;
    height: 100vh;
  }
  video {
    width: 100vw;
    height: 100vh;
    object-fit: fill;
  }
  .container {
    position: relative;
  }
  #zanting {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 8%;
  }
</style>
</head>
<body onLoad="OnInit()">
    <div class="container" style="padding: 0; border-radius: 0;">
        <img
          id="videoStream" 
          style="display: block;-webkit-user-select: none;margin: auto;background-color: hsl(0, 0%, 25%);" 
          alt="Live Stream"
        >
        <img id="zanting" src="zanting.svg" alt="" >
        <video id="video" autoplay></video>

        <div id="url-studio" style="display: none;"></div>
        <!-- 控制按钮 -->
        <!-- <button id="toggleButton">暂停</button> -->
        <!-- <h1 class="trans">Printer Connection</h1>
        <p class="trans">Please set up your printer connection to view the device.</p>
        <img src="setup_connection.gif" alt="Printer connection setup demonstration" style="max-width: 100%; height: auto; display: block;"/> -->
    </div>
    <script>
    //    var TestData={"command": "studio_rtsp","rtsp_address": "http://10.33.23.139:8080/?action=stream"};
       var rtsp_address = window.location.search
       var urlParams = new URLSearchParams(rtsp_address);
       var lang = urlParams.get('lang');
       var videoStreamImg = document.getElementById("videoStream");
       videoStreamImg.src = 'hei.svg';
       videoStreamImg.style.backgroundImage = 'url("hei.svg")'


       let streamPaused = false;

       videoStreamImg.addEventListener('click', function() {
           if (!streamPaused) {
            if (lang) {
              videoStreamImg.src = '';
              videoStreamImg.style.backgroundImage = 'url("")'
              var zanting = document.getElementById("zanting")
              zanting.style.display = 'none'
              videoStreamImg.src = lang;
              streamPaused = true;
              setTimeout(function() {
                  videoStreamImg.src = 'hei.svg';
                  zanting.style.display = 'block'
                  videoStreamImg.style.backgroundImage = 'url("hei.svg")'
                  streamPaused = false;
              }, 600000); // 10分钟后暂停，10分钟 = 600000毫秒
            } else {
              videoStreamImg.src = 'hei.svg';
              streamPaused = false;
              alert('无法获取视频流路径')
            }
           } else {
             videoStreamImg.src = 'hei.svg';
             var zanting = document.getElementById("zanting")
             zanting.style.display = 'block'
             videoStreamImg.style.backgroundImage = 'url("hei.svg")'
             streamPaused = false;
           }
       });

       var video = document.getElementById("video");
       video.style.display = "none"


      //  function SendWXMessage ( strMsg ) {
      //    window.postMessage(strMsg, '*')
      //  }

       if (lang) {
        if (lang.endsWith(".m3u8")) {
          // console.log('.m3u8')
          video.style.display = "block"
          videoStreamImg.style.display = "none"
          video.style.backgroundImage = "url('hei.svg')"
          video.style.backgroundSize = "cover"
          video.style.backgroundRepeat = "no-repeat"
          video.style.backgroundPosition = "center"
          video.addEventListener('click', function() {
            if (!streamPaused) {
              OnGetUrl()
              setTimeout(function() {
                var element = document.getElementById('url-studio');
                var content = element.innerHTML;
                lang = content
                if (Hls.isSupported()) {
                  var video = document.getElementById('video')
                  video.style.backgroundImage = "none"
                  var zanting = document.getElementById("zanting")
                  zanting.style.display = 'none'
                  var hls = new Hls()
                  // 绑定视频流地址
                  hls.loadSource(lang)
                  // 绑定 video 容器
                  hls.attachMedia(video)
                  if (!streamPaused) {
                    setTimeout(function() {
                        video.src = ''
                        video.style.backgroundImage = "url('hei.svg')"
                        video.style.backgroundSize = "cover"
                        video.style.backgroundRepeat = "no-repeat"
                        video.style.backgroundPosition = "center"
                        var zanting = document.getElementById("zanting")
                        zanting.style.display = 'block'
                        streamPaused = false;
                    }, 600000); // 10分钟后暂停，10分钟 = 600000毫秒
                    streamPaused = true;
                  }
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                  if (!streamPaused) {
                    // 对于原生支持 HLS 的平台（如 Safari），直接播放
                    video.style.backgroundImage = "none"
                    var zanting = document.getElementById("zanting")
                    zanting.style.display = 'none'
                    video.src = lang
                    setTimeout(function() {
                      video.src = ''
                      video.style.backgroundImage = "url('hei.svg')"
                      video.style.backgroundSize = "cover"
                      video.style.backgroundRepeat = "no-repeat"
                      video.style.backgroundPosition = "center"
                      var zanting = document.getElementById("zanting")
                      zanting.style.display = 'block'
                      streamPaused = false;
                    }, 600000); // 10分钟后暂停，10分钟 = 600000毫秒
                    streamPaused = true;
                  }
                } 
              },10)
            } else {
              video.pause()
              // video.src = ''
              video.style.backgroundImage = "url('hei.svg')"
              video.style.backgroundSize = "cover"
              video.style.backgroundRepeat = "no-repeat"
              video.style.backgroundPosition = "center"
              var zanting = document.getElementById("zanting")
              zanting.style.display = 'block'
              streamPaused = false;
            }
          })
        }
       }
       

       // 适配设置
      //  var docEl = document.documentElement;
      //  function setRemUnit () {
      //    var rem = docEl.clientWidth / 10; // 可根据不同电脑分辨率进行手动修改
      //    console.log(rem)
      //    docEl.style.fontSize = rem + 'px'
      //  };
 
      //  setRemUnit();
 
      //  window.addEventListener('resize', setRemUnit);
      //  window.addEventListener('pageshow', function (e) {
      //    if (e.persisted) {
      //      setRemUnit();
      //    }
      //  });
    </script>
</body>
</html>
